<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEJM Kahoot – Joueur</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDABerqe3MH_GIfhXMs5h4oiG_kPpIJDK8",
    authDomain: "cejm-theme-1.firebaseapp.com",
    databaseURL: "https://cejm-theme-1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cejm-theme-1",
    storageBucket: "cejm-theme-1.firebasestorage.app",
    messagingSenderId: "384316446622",
    appId: "1:384316446622:web:30c3b23a2120991e8c688f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const COLORS = ['#3b82f6','#ef4444','#f59e0b','#22c55e'];
  const LABELS = ['A','B','C','D'];

  let gamePin = null, playerId = null, playerName = null;
  let currentQ = -1, hasAnswered = false, timeLeft = 20;
  let myScore = 0, myStreak = 0;

  function $(id) { return document.getElementById(id); }
  function uid() { return Math.random().toString(36).slice(2, 10); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = $(id);
    el.classList.add('active');
    el.classList.remove('anim-in');
    void el.offsetWidth;
    el.classList.add('anim-in');
  }

  window.joinGame = async function() {
    const pin = $('pin-input').value.trim();
    const name = $('name-input').value.trim();
    if (!pin || !name) { showErr('Remplis le code PIN et ton prenom !'); return; }
    if (name.length > 20) { showErr('Prenom trop long (max 20 caracteres)'); return; }

    const snap = await get(ref(db, `games/${pin}`));
    if (!snap.exists()) { showErr('Partie introuvable. Verifie le code PIN.'); return; }
    if (snap.val().phase !== 'lobby') { showErr('La partie a deja commence !'); return; }

    gamePin = pin; playerName = name; playerId = uid();
    await set(ref(db, `games/${gamePin}/players/${playerId}`), { name, score: 0, joined: Date.now() });

    showScreen('screen-wait');
    $('wait-name').textContent = name;

    onValue(ref(db, `games/${gamePin}`), snap => {
      const g = snap.val();
      if (!g) return;
      if (g.timeLeft !== undefined) timeLeft = g.timeLeft;

      if (g.phase === 'question' && g.currentQ !== currentQ) {
        currentQ = g.currentQ;
        hasAnswered = false;
        renderQuestion(g.questionData);
        showScreen('screen-question');
      }
      if (g.phase === 'reveal' && g.questionData?.correct >= 0) {
        showReveal(g.questionData.correct);
      }
      if (g.phase === 'podium') {
        showPodium();
      }
    });
  };

  function showErr(msg) {
    $('join-error').textContent = msg;
    $('join-error').style.display = 'block';
  }

  function renderQuestion(qData) {
    if (!qData) return;
    $('p-cat').textContent = qData.cat;
    $('p-q-num').textContent = `Question ${qData.index + 1} / ${qData.total}`;
    $('p-q-text').textContent = qData.text;
    $('p-feedback').style.display = 'none';
    $('p-waiting').style.display = 'none';

    $('p-answers').innerHTML = qData.answers.map((a, i) =>
      `<button class="p-btn" id="pbtn-${i}"
        style="border-color:${COLORS[i]};background:${COLORS[i]}18;color:${COLORS[i]}"
        onclick="selectAnswer(${i})">
        <div class="p-btn-label" style="background:${COLORS[i]}">${LABELS[i]}</div>
        <span class="p-btn-text">${a}</span>
      </button>`
    ).join('');

    $('p-q-text').classList.remove('q-pop');
    void $('p-q-text').offsetWidth;
    $('p-q-text').classList.add('q-pop');
  }

  window.selectAnswer = async function(idx) {
    if (hasAnswered) return;
    hasAnswered = true;

    await set(ref(db, `games/${gamePin}/answers/${playerId}`), {
      answer: idx, timeLeft, name: playerName
    });

    document.querySelectorAll('.p-btn').forEach((b, i) => {
      b.disabled = true;
      b.style.opacity = i === idx ? '1' : '0.25';
      if (i === idx) b.style.transform = 'scale(1.03)';
    });

    $('p-waiting').style.display = 'flex';
  };

  function showReveal(correctIdx) {
    if (correctIdx === undefined || correctIdx < 0) return;

    document.querySelectorAll('.p-btn').forEach((b, i) => {
      b.disabled = true;
      if (i === correctIdx) {
        b.style.opacity = '1';
        b.style.background = 'rgba(34,197,94,0.2)';
        b.style.borderColor = '#22c55e';
        b.style.color = '#22c55e';
      } else {
        b.style.opacity = '0.2';
      }
    });

    $('p-waiting').style.display = 'none';

    get(ref(db, `games/${gamePin}/answers/${playerId}`)).then(s => {
      const ans = s.val();
      const fb = $('p-feedback');
      fb.style.display = 'flex';
      if (ans && ans.answer === correctIdx) {
        myStreak++;
        fb.className = 'p-feedback fb-correct';
        fb.innerHTML = myStreak >= 3
          ? `<span>Serie de ${myStreak} !</span>`
          : `<span>Bonne reponse !</span>`;
      } else {
        myStreak = 0;
        fb.className = 'p-feedback fb-wrong';
        fb.innerHTML = ans ? `<span>Mauvaise reponse</span>` : `<span>Temps ecoule !</span>`;
      }
    });
  }

  async function showPodium() {
    showScreen('screen-podium');
    const [pSnap, meSnap] = await Promise.all([
      get(ref(db, `games/${gamePin}/players`)),
      get(ref(db, `games/${gamePin}/players/${playerId}`))
    ]);
    const players = Object.values(pSnap.val() || {}).sort((a, b) => (b.score || 0) - (a.score || 0));
    const me = meSnap.val();
    const rank = players.findIndex(p => p.name === playerName) + 1;
    const rankLabels = ['1er', '2eme', '3eme'];

    $('my-rank').textContent = rankLabels[rank - 1] || `#${rank}`;
    $('my-score').textContent = (me?.score || 0) + ' pts';
    $('my-name-display').textContent = playerName;

    $('final-lb').innerHTML = players.slice(0, 10).map((p, i) =>
      `<div class="lb-row ${p.name === playerName ? 'lb-me' : ''} ${i === 0 ? 'lb-gold' : i === 1 ? 'lb-silver' : i === 2 ? 'lb-bronze' : ''}">
        <span class="lb-rank">${rankLabels[i] || `#${i + 1}`}</span>
        <span class="lb-name">${p.name}</span>
        <span class="lb-score">${p.score || 0} pts</span>
      </div>`
    ).join('');

    launchConfetti();
  }

  function launchConfetti() {
    const canvas = $('p-confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    const pieces = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * -canvas.height,
      w: Math.random() * 9 + 4, h: Math.random() * 5 + 3,
      color: ['#f59e0b','#3b82f6','#22c55e','#ef4444','#a855f7','#fff'][Math.floor(Math.random() * 6)],
      speed: Math.random() * 2.5 + 1.5, angle: Math.random() * 360, spin: (Math.random() - 0.5) * 4
    }));
    let frames = 0;
    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save(); ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.angle * Math.PI / 180); ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
        p.y += p.speed; p.angle += p.spin;
        if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
      });
      if (++frames < 280) requestAnimationFrame(draw);
      else { canvas.style.display = 'none'; }
    })();
  }
</script>
<style>
:root {
  --bg: #080812;
  --card: #13132e;
  --border: rgba(255,255,255,0.07);
  --gold: #f59e0b;
  --blue: #3b82f6;
  --red: #ef4444;
  --green: #22c55e;
  --text: #f0f0f0;
  --muted: #64748b;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  background-image:
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(239,68,68,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 55%);
}
.screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 460px; gap: 14px; }
.screen.active { display: flex; }
.screen.anim-in { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1); }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* JOIN */
.join-card {
  background: var(--card); border-radius: 20px; padding: 38px 28px;
  text-align: center; width: 100%;
  border: 1px solid rgba(245,158,11,0.18);
  box-shadow: 0 0 60px rgba(0,0,0,0.4);
}
.logo { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.logo em { color: var(--gold); font-style: normal; }
.tagline { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 26px; }

.field { margin-bottom: 13px; text-align: left; }
.field label { display: block; font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 13px 15px; border-radius: 11px;
  background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.09);
  color: var(--text); font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--gold); }
.field input::placeholder { color: var(--muted); font-weight: 400; }
#pin-input { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; letter-spacing: 8px; text-align: center; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 100%; padding: 14px; border-radius: 50px; border: none;
  font-family: 'Montserrat', sans-serif; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px;
}
.btn-blue { background: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
.btn-blue:hover { background: #2563eb; transform: translateY(-2px); }

.error { color: var(--red); font-size: 0.82rem; font-weight: 700; display: none; background: rgba(239,68,68,0.08); padding: 9px 13px; border-radius: 9px; border: 1px solid rgba(239,68,68,0.25); margin-top: 10px; text-align: center; }

/* WAIT */
.wait-card { background: var(--card); border-radius: 18px; padding: 38px 28px; text-align: center; width: 100%; border: 1px solid var(--border); }
.wait-avatar { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 16px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.wait-card h2 { font-family: 'Montserrat', sans-serif; font-size: 1.35rem; margin-bottom: 6px; }
.wait-card p { color: var(--muted); font-size: 0.85rem; }
.dots::after { content: ''; animation: dotdot 1.4s infinite steps(4,end); }
@keyframes dotdot { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

/* QUESTION */
.p-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
.p-cat { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); padding: 4px 11px; border-radius: 18px; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.p-q-num { font-size: 0.72rem; color: var(--muted); font-weight: 700; }
.p-question {
  background: var(--card); border-radius: var(--r); padding: 20px 22px; width: 100%;
  font-size: 1.05rem; font-weight: 700; line-height: 1.55;
  border: 1px solid rgba(255,255,255,0.08);
}
.p-question.q-pop { animation: qPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes qPop { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

.p-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.p-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px;
  padding: 16px 10px; border-radius: 13px; border: 1.5px solid;
  cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700;
  transition: all 0.2s; min-height: 90px; background: transparent;
}
.p-btn:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.p-btn-label { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.88rem; color: #fff; }
.p-btn-text { font-size: 0.78rem; text-align: center; line-height: 1.35; }

.p-feedback {
  display: none; align-items: center; justify-content: center;
  padding: 12px 18px; border-radius: 11px; width: 100%;
  font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem;
  animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
.fb-correct { background: rgba(34,197,94,0.15); border: 1.5px solid rgba(34,197,94,0.35); color: #86efac; }
.fb-wrong { background: rgba(239,68,68,0.12); border: 1.5px solid rgba(239,68,68,0.3); color: #fca5a5; }

.p-waiting { display: none; align-items: center; gap: 10px; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* PODIUM */
.podium-card { background: var(--card); border-radius: 18px; padding: 30px 24px; text-align: center; width: 100%; border: 1px solid rgba(245,158,11,0.18); }
.my-rank-big { font-family: 'Montserrat', sans-serif; font-size: 3.5rem; font-weight: 900; color: var(--gold); animation: bounce 0.6s ease 0.3s both; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.my-score-big { font-family: 'Montserrat', sans-serif; font-size: 1.7rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.my-name-lbl { color: var(--muted); font-size: 0.82rem; margin-bottom: 22px; }
.lb-row { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 9px; margin-bottom: 5px; background: rgba(255,255,255,0.03); font-size: 0.85rem; }
.lb-me { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
.lb-gold { background: rgba(245,158,11,0.08); }
.lb-silver { background: rgba(148,163,184,0.06); }
.lb-bronze { background: rgba(180,120,60,0.06); }
.lb-rank { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.72rem; color: var(--muted); width: 34px; }
.lb-name { flex: 1; font-weight: 700; }
.lb-score { font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--gold); font-size: 0.85rem; }

#p-confetti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; display: none; }
</style>
</head>
<body>
<canvas id="p-confetti"></canvas>

<!-- JOIN -->
<div class="screen active" id="screen-join">
  <div class="join-card">
    <div class="logo"><em>CEJM</em> Quiz</div>
    <div class="tagline">Rejoindre une partie</div>
    <div class="field">
      <label>Code PIN de la salle</label>
      <input type="number" id="pin-input" placeholder="123456" maxlength="6">
    </div>
    <div class="field">
      <label>Ton prenom</label>
      <input type="text" id="name-input" placeholder="Ex : Yunus" maxlength="20">
    </div>
    <button class="btn btn-blue" onclick="joinGame()">Rejoindre</button>
    <div class="error" id="join-error"></div>
  </div>
</div>

<!-- WAIT -->
<div class="screen" id="screen-wait">
  <div class="wait-card">
    <div class="wait-avatar">★</div>
    <h2>Bienvenue, <span id="wait-name"></span> !</h2>
    <p>En attente du demarrage<span class="dots"></span></p>
  </div>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <div class="p-top">
    <div class="p-cat" id="p-cat">Economie</div>
    <div class="p-q-num" id="p-q-num">Question 1 / 25</div>
  </div>
  <div class="p-question" id="p-q-text"></div>
  <div class="p-answers" id="p-answers"></div>
  <div class="p-feedback" id="p-feedback"></div>
  <div class="p-waiting" id="p-waiting">
    <div class="spinner"></div>
    <span>Reponse envoyee — en attente...</span>
  </div>
</div>

<!-- PODIUM -->
<div class="screen" id="screen-podium">
  <div class="podium-card">
    <div class="my-rank-big" id="my-rank">?</div>
    <div class="my-score-big" id="my-score">0 pts</div>
    <div class="my-name-lbl" id="my-name-display"></div>
    <div id="final-lb"></div>
  </div>
</div>

</body>
</html>
